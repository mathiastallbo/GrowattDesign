<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GrowattDesign</title>
<style>
  :root{
    --bg:#f3f4f2; --card:#ffffff; --card2:#f7f8f6; --line:#e5e7e2; --line2:#d3d6cd;
    --text:#1a1d1a; --mut:#666b63; --faint:#8d928a;
    --grn:#68b828; --grnD:#4c8a1a; --grnBg:#eef8e3; --grnLine:#c9e8ab;
    --amb:#b9740a; --ambBg:#fdf5e6; --ambLine:#f1d9a3;
    --red:#d92d2d; --redBg:#fdecec; --redLine:#f5c2c2;
    --slate:#475569;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --shadow:0 1px 2px rgba(16,27,45,.04),0 6px 18px rgba(16,27,45,.06);
    --sbw:575px; --sbgap:16px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.45}
  .page{max-width:1180px;margin:0 auto;padding:22px 14px 96px}
  .topbar{display:flex;align-items:center;gap:11px;margin-bottom:18px}
  .topbar>div:nth-child(2){flex:1}
  .aibtn{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,#1a2f22,#0f1b2d);color:#8ffcb8;border:1px solid #2c9d5e;padding:9px 15px;border-radius:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0}
  .aibtn:hover{box-shadow:0 0 0 3px rgba(51,218,122,.18)}
  .opt.ai .name svg{color:var(--grn);vertical-align:-2px;margin-right:2px}

  /* ===== Growatt AI info page \u2014 deliberately distinct visual language ===== */
  .aipage{margin:-22px -14px -96px;background:#0b1420;color:#e7edf5;min-height:100vh;font-family:inherit}
  .ai-hero{position:relative;overflow:hidden;padding:26px 22px 34px;background:radial-gradient(1200px 500px at 15% -10%,rgba(51,218,122,.28),transparent),linear-gradient(160deg,#0f1b2d,#0a1420 60%,#0b1420)}
  .ai-back{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);color:#cfe0d8;padding:8px 14px;border-radius:10px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:22px}
  .ai-back:hover{background:rgba(255,255,255,.1)}
  .ai-badge{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#7bc736,#4c8a1a);color:#fff;font-weight:800;font-size:12px;letter-spacing:.06em;padding:6px 13px;border-radius:20px;margin-bottom:16px}
  .ai-hero h1{font-size:clamp(26px,4vw,38px);font-weight:800;margin:0 0 12px;letter-spacing:-.02em;background:linear-gradient(90deg,#fff,#bfe9cd);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;max-width:640px}
  .ai-tag{font-size:15.5px;color:#a9b8c9;max-width:560px;line-height:1.6}
  .ai-body{padding:8px 22px 60px;max-width:920px;margin:0 auto}
  .ai-section{margin:38px 0}
  .ai-section h2{font-size:20px;font-weight:750;color:#fff;margin:0 0 6px;letter-spacing:-.01em}
  .ai-section .ai-lead{color:#a9b8c9;font-size:14.5px;line-height:1.7;max-width:720px;margin-bottom:18px}
  .ai-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}
  .ai-card{background:linear-gradient(155deg,rgba(255,255,255,.05),rgba(255,255,255,.015));border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:20px}
  .ai-card .ic{width:38px;height:38px;border-radius:11px;background:rgba(51,218,122,.14);color:#5eeb96;display:flex;align-items:center;justify-content:center;margin-bottom:13px}
  .ai-card h3{font-size:14.5px;font-weight:700;color:#fff;margin:0 0 7px}
  .ai-card p{font-size:13px;color:#9fb0c2;line-height:1.6;margin:0}
  .ai-modes-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
  .ai-mode{border-radius:16px;padding:22px;border:1px solid rgba(255,255,255,.09)}
  .ai-mode.auto{background:linear-gradient(155deg,rgba(51,218,122,.13),rgba(51,218,122,.02))}
  .ai-mode.man{background:linear-gradient(155deg,rgba(96,150,255,.13),rgba(96,150,255,.02))}
  .ai-mode .tag{display:inline-block;font-size:10.5px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;padding:3px 10px;border-radius:20px;margin-bottom:11px}
  .ai-mode.auto .tag{background:rgba(51,218,122,.22);color:#8ffcb8}
  .ai-mode.man .tag{background:rgba(96,150,255,.22);color:#a9c7ff}
  .ai-mode h3{font-size:16px;font-weight:750;color:#fff;margin:0 0 8px}
  .ai-mode p{font-size:13.5px;color:#aebccb;line-height:1.65;margin:0}
  .ai-steps{counter-reset:aistep;display:flex;flex-direction:column;gap:3px}
  .ai-step{display:flex;gap:14px;padding:14px 4px;border-bottom:1px solid rgba(255,255,255,.06)}
  .ai-step:last-child{border-bottom:none}
  .ai-step .n{counter-increment:aistep;flex-shrink:0;width:26px;height:26px;border-radius:50%;background:rgba(51,218,122,.15);color:#8ffcb8;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center}
  .ai-step .n::before{content:counter(aistep)}
  .ai-step .tx b{color:#fff;font-size:13.5px}
  .ai-step .tx p{margin:3px 0 0;font-size:13px;color:#9fb0c2;line-height:1.6}
  .ai-pillrow{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px}
  .ai-pill{font-size:11.5px;font-weight:650;color:#bfe9cd;background:rgba(51,218,122,.1);border:1px solid rgba(51,218,122,.28);padding:5px 11px;border-radius:20px}
  .ai-req{background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:22px}
  .ai-req .row{display:flex;gap:11px;align-items:flex-start;padding:9px 0}
  .ai-req .row .ic{color:#5eeb96;flex-shrink:0;margin-top:1px}
  .ai-req .row b{color:#fff}
  .ai-req .row p{margin:2px 0 0;font-size:13px;color:#9fb0c2;line-height:1.6}
  .ai-foot{text-align:center;padding:10px 0 4px;color:#647285;font-size:12px}
  @media(max-width:700px){.aipage{margin:-22px -14px -96px}.ai-hero{padding:20px 16px 26px}.ai-body{padding:6px 16px 60px}}
  .logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#7bc736,#4c8a1a);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow)}
  .topbar h1{font-size:21px;font-weight:800;margin:0;letter-spacing:-.01em;color:#141613}
  .topbar .sub{color:var(--mut);font-size:12.5px;margin-top:3px}
  .topbar .accentbar{display:flex;gap:5px;margin-top:9px}
  .topbar .accentbar span{height:3px;border-radius:2px}
  .topbar .accentbar span:nth-child(1){width:26px;background:var(--faint);opacity:.35}
  .topbar .accentbar span:nth-child(2){width:34px;background:var(--grn)}
  .topbar .accentbar span:nth-child(3){width:26px;background:var(--faint);opacity:.35}
  .btn{display:inline-flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--line2);color:var(--text);padding:9px 13px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
  .btn.primary{background:var(--grn);border-color:var(--grn);color:#fff}
  .btn.ok{background:var(--grnD);border-color:var(--grnD);color:#fff}
  .layout{display:block}
  @media(min-width:980px){.layout{padding-right:calc(var(--sbw) + var(--sbgap))}}
  .stepcol{display:flex;flex-direction:column;gap:16px;min-width:0}
  .step{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);overflow:hidden;scroll-margin-top:14px;transition:box-shadow .25s,border-color .25s}
  .step.justarrived{animation:steparrive 1.1s ease}
  @keyframes steparrive{0%{box-shadow:var(--shadow),0 0 0 0 rgba(51,218,122,0)}18%{border-color:var(--grn);box-shadow:0 1px 2px rgba(16,27,45,.04),0 6px 18px rgba(16,27,45,.06),0 0 0 3px rgba(51,218,122,.28)}100%{border-color:var(--line);box-shadow:var(--shadow),0 0 0 0 rgba(51,218,122,0)}}
  .step-h{display:flex;align-items:center;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line)}
  .num{width:27px;height:27px;flex-shrink:0;border-radius:50%;background:var(--grnBg);border:1px solid var(--grnLine);color:var(--grnD);font-weight:750;font-size:13px;display:flex;align-items:center;justify-content:center;box-shadow:inset 0 0 0 1px rgba(255,255,255,.4)}
  .step-h .ttl{font-weight:700;font-size:15px}
  .step-h .desc{font-size:12px;color:var(--mut);margin-top:1px}
  .step-b{padding:17px}
  .grid{display:grid;gap:10px}
  .g2{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:repeat(3,1fr)}
  @media(max-width:560px){.g3{grid-template-columns:1fr 1fr}}
  .opt{text-align:left;border:1px solid var(--line2);background:var(--card2);border-radius:12px;padding:12px 13px;cursor:pointer;font-family:inherit;color:var(--text)}
  .opt.on{border-color:var(--grn);background:var(--grnBg);box-shadow:inset 0 0 0 1px var(--grn)}
  .opt .name{font-weight:700;font-size:14px}
  .opt.on .name{color:var(--grnD)}
  .opt .meta{font-size:11.5px;color:var(--mut);margin-top:3px}
  .opt.crossed{opacity:.55;cursor:not-allowed;background:#f1f4f8}
  .opt.crossed .name{text-decoration:line-through;color:var(--faint)}
  .opt.invalidsel{border-color:var(--red);box-shadow:inset 0 0 0 1px var(--red)}
  .opt .x{color:var(--red);font-weight:700;font-size:10.5px;margin-top:6px;display:flex;align-items:center;gap:4px}
  .badge{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:20px;margin-top:7px}
  .badge.g{background:var(--grnBg);color:var(--grnD);border:1px solid var(--grnLine)}
  .badge.a{background:var(--ambBg);color:var(--amb);border:1px solid var(--ambLine)}
  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{border:1px solid var(--line2);background:var(--card2);border-radius:9px;padding:8px 13px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--text)}
  .chip.on{border-color:var(--grn);background:var(--grn);color:#fff}
  .chip.sm{padding:6px 11px;font-size:12.5px}
  .chip.crossed{opacity:.5;cursor:not-allowed;text-decoration:line-through;color:var(--faint);background:#f1f4f8;border-color:var(--line)}
  .unittabs{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-bottom:13px;padding:9px 11px;background:var(--card2);border:1px solid var(--line);border-radius:10px;color:var(--faint)}
  .uchip{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line2);background:#fff;border-radius:9px;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer;color:var(--text)}
  .uchip.on{border-color:var(--grn);background:var(--grnBg);color:var(--grnD)}
  .uchip b{opacity:.55;font-weight:800;padding:0 2px;cursor:pointer}
  .uchip b:hover{opacity:1;color:var(--red)}
  .note{display:flex;gap:8px;margin-top:12px;font-size:12px;color:var(--mut);line-height:1.5;background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  .note .i{color:var(--amb);flex-shrink:0;margin-top:1px}
  .note b{color:var(--text)}
  .sublabel{font-size:12px;color:var(--mut);font-weight:600;margin:14px 0 8px}
  .optbadge{display:inline-block;font-size:10.5px;font-weight:700;color:var(--mut);background:var(--card2);border:1px solid var(--line2);border-radius:20px;padding:2px 8px;margin-left:8px;vertical-align:middle}
  .pvtop{margin-top:14px;background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:14px 15px}
  .pvtop.over{background:var(--redBg);border-color:var(--redLine)}
  .pvrow{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .pvbig{font-family:var(--mono);font-size:28px;font-weight:800;color:var(--grnD)}
  .pvbig small{font-size:14px;color:var(--mut);font-weight:500}
  .pvhint{font-size:12.5px;color:var(--mut);display:flex;align-items:center;gap:7px;line-height:1.4}
  .pvhint b{color:var(--text)}
  .gauge{margin-top:13px}
  .gtop{display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin-bottom:6px}
  .gnum{font-family:var(--mono);font-size:22px;font-weight:800;color:var(--grnD);flex-shrink:0}
  .gnum.over{color:var(--red)}
  .ghead{font-size:11.5px;color:var(--mut);text-align:right;line-height:1.35}
  .ghead b{color:var(--text)}
  .gtrack{position:relative;height:13px;background:#e3e9f2;border-radius:7px;overflow:hidden}
  .gfill{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,#82c94a,#68b828);transition:width .3s;border-radius:7px}
  .gfill.over{background:linear-gradient(90deg,#e8863a,#d92d2d)}
  .gmid{position:absolute;top:0;bottom:0;left:50%;width:1px;background:rgba(15,27,45,.14)}
  .gscale{display:flex;justify-content:space-between;font-size:9.5px;color:var(--faint);margin-top:4px;font-family:var(--mono)}
  .locked{display:flex;align-items:center;gap:11px;background:var(--grnBg);border:1px solid var(--grnLine);border-radius:12px;padding:14px 15px}
  .locked .ico{color:var(--grnD);flex-shrink:0}
  .locked .t{font-weight:700;font-size:14px;color:var(--grnD)}
  .locked .s{font-size:12px;color:var(--grnD);opacity:.85;margin-top:2px}
  .reqcard{display:flex;align-items:center;gap:11px;background:var(--ambBg);border:1px solid var(--ambLine);border-radius:12px;padding:14px 15px}
  .reqcard .ico{color:var(--amb);flex-shrink:0}
  .reqcard .t{font-weight:700;font-size:14px;color:var(--amb)}
  .reqcard .s{font-size:12px;color:#7a5a18;margin-top:2px}
  .placeholder{display:flex;align-items:center;gap:9px;background:var(--card2);border:1px dashed var(--line2);border-radius:12px;padding:15px;color:var(--mut);font-size:13px}
  .placeholder .i{color:var(--faint);flex-shrink:0}
  .notice{display:flex;gap:8px;margin-top:11px;font-size:12px;line-height:1.5;border-radius:10px;padding:10px 12px}
  .notice.g{background:var(--grnBg);border:1px solid var(--grnLine);color:var(--grnD)}
  .notice.g .i{color:var(--grnD);flex-shrink:0;margin-top:1px}
  .notice b{color:var(--text)}
  .switchrow{display:flex;align-items:center;justify-content:space-between;background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;gap:12px}
  .switchrow .lab{font-size:13.5px;font-weight:600}
  .switchrow .s2{font-size:11.5px;color:var(--mut);margin-top:2px}
  .sw{width:46px;height:26px;border-radius:20px;background:#cdd6e4;position:relative;transition:.15s;flex-shrink:0;cursor:pointer}
  .sw.on{background:var(--grn)}
  .knob{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.15s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
  .sw.on .knob{left:23px}
  .tower{border:1px solid var(--line2);border-radius:13px;padding:13px;background:var(--card2)}
  .tower+.tower{margin-top:11px}
  .towers{display:grid;gap:11px}
  .towers.multi{grid-template-columns:repeat(auto-fit,minmax(235px,1fr))}
  .towers .tower+.tower{margin-top:0}
  .tower-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
  .tower-h .nm{font-weight:700;font-size:13.5px;display:flex;align-items:center;gap:7px}
  .tower-h .kw{font-family:var(--mono);color:var(--grnD);font-weight:700;font-size:13.5px}
  .batlabel{font-size:11px;font-weight:800;color:var(--slate);background:#e7ecf4;border:1px solid var(--line2);border-radius:7px;padding:2px 8px;letter-spacing:.03em}
  .stepper{display:flex;align-items:center;gap:9px}
  .sbtn{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;border:1px solid var(--line2);background:#fff;color:#c2cad8;cursor:default}
  .sbtn.active{color:var(--text);cursor:pointer}
  .sval{min-width:24px;text-align:center;font-family:var(--mono);font-size:18px;font-weight:700}
  .modrow{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .modrow+.modrow{margin-top:9px}
  .modrow .lab{font-size:12.5px;color:var(--mut);font-weight:600}
  .modrow .lab b{color:var(--text)}
  .totrow{font-size:11.5px;color:var(--mut);margin-top:9px;font-family:var(--mono)}
  .totrow b{color:var(--grnD)}
  .diagram{margin-top:13px}
  .cols{display:flex;gap:11px;align-items:flex-end}
  .col{flex:1;min-width:70px;max-width:130px}
  .blk{display:flex;align-items:center;justify-content:space-between;padding:0 9px;font-size:10.5px;font-family:var(--mono);font-weight:600;border-radius:8px}
  .mod{height:30px;background:linear-gradient(180deg,#82c94a,#5a9e22);color:#fff;margin-top:6px;box-shadow:0 1px 2px rgba(16,27,45,.12)}
  .pm{height:30px;background:linear-gradient(180deg,#64748b,#475569);color:#fff;box-shadow:0 1px 2px rgba(16,27,45,.12)}
  .pmb{height:34px;background:linear-gradient(180deg,#3f9c66,#2c6f49);color:#fff;box-shadow:0 1px 2px rgba(16,27,45,.16);border:1px solid rgba(255,255,255,.25)}
  .base{height:12px;border-radius:6px;background:#dde4ee;border:1px solid var(--line2);color:var(--faint);font-size:9.5px}
  .kaskad{display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--amb);font-size:8.5px;font-weight:700;padding-bottom:24px;min-width:34px}
  .bases{display:flex;gap:11px;margin-top:6px;align-items:center}
  .axecab{position:relative;width:100%;max-width:170px;height:74px;border-radius:9px;background:#dde4ee;border:1px solid var(--line2);overflow:hidden;display:flex;align-items:flex-end}
  .axecab-fill{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(180deg,#3f9c66,#2c6f49);transition:height .25s}
  .axecab-lbl{position:relative;z-index:1;display:flex;align-items:center;gap:6px;color:#fff;font-size:11px;font-weight:700;font-family:var(--mono);padding:9px;text-shadow:0 1px 2px rgba(0,0,0,.4)}
  .field{display:flex;flex-direction:column;gap:6px}
  .field label{font-size:12px;font-weight:600;color:var(--mut)}
  .field input{border:1px solid var(--line2);border-radius:10px;padding:11px 12px;font-size:16px;font-family:var(--mono);font-weight:700;color:var(--text);background:#fff;width:100%}
  .field input:focus{outline:none;border-color:var(--grn);box-shadow:0 0 0 3px var(--grnBg)}
  .field .unit{font-size:11px;color:var(--faint);font-weight:500}
  .pverr{display:flex;align-items:center;gap:8px;background:var(--redBg);border:1px solid var(--redLine);color:var(--red);border-radius:10px;padding:11px 13px;font-size:12.5px;font-weight:600}

  /* ===== Right sidebar: fixed on desktop, 30% photo / 70% cart ===== */
  .cartcol{margin-top:14px}
  @media(min-width:980px){
    .cartcol{
      position:fixed; top:16px;
      right:max(14px, calc(50vw - 576px));
      width:var(--sbw); height:calc(100vh - 32px);
      display:flex; flex-direction:column;
      z-index:40; margin-top:0;
    }
  }
  .housephoto{position:relative;flex-shrink:0;background:#0d1930;border-radius:16px 16px 0 0;box-shadow:var(--shadow);overflow:hidden}
  .photostage{position:relative;width:100%;font-size:0;line-height:0}
  .envbg{position:absolute;inset:0;width:100%;height:100%;z-index:0}
  .photostage img.hbase{display:block;width:100%;height:auto;position:relative;z-index:1}
  .complabel{position:absolute;transform:translate(-50%,-50%);font-size:10.5px;font-weight:800;letter-spacing:.04em;color:#b9c6d8;background:rgba(13,22,38,.72);border:1.5px solid rgba(255,255,255,.22);border-radius:20px;padding:3px 9px;pointer-events:none;opacity:.7;transition:.3s;white-space:nowrap;z-index:3;backdrop-filter:blur(2px)}
  .complabel.lit{color:#8ffcb8;background:rgba(10,26,18,.85);border-color:#33da7a;box-shadow:0 0 10px rgba(51,218,122,.5);opacity:1}

var state={page:'main',segment:null,multi:false,unit:0,units:[],panelW:450,panelCount:0,family:null,kw:null,dongle:null,metering:null,meterType:'TPM-C',backupOn:true,apx:'1.0',inputs:[],wantBattery:null};
function snapshotUnit(){return {family:state.family,kw:state.kw,backupOn:state.backupOn,wantBattery:state.wantBattery,apx:state.apx,inputs:state.inputs};}

}

        modUI='<div class="modrow"><span class="lab">Tower A <b>\u00b7 BMS'+(a2()?' (5 kWh)':'')+'</b></span><div class="stepper"><button class="sbtn '+(d1?'active':'')+'" data-act="colmod" data-i="'+i+'" data-col="c1" data-d="-1">'+ic('minus',16)+'</button><span class="sval">'+inp.c1+'</span><button class="sbtn '+(u1?'active':'')+'" data-act="colmod" data-i="'+i+'" data-col="c1" data-d="1">'+ic('plus',16)+'</button></div></div>'+
          '<div class="modrow"><span class="lab">Tower B</span><div class="stepper"><button class="sbtn '+(d2?'active':'')+'" data-act="colmod" data-i="'+i+'" data-col="c2" data-d="-1">'+ic('minus',16)+'</button><span class="sval">'+inp.c2+'</span><button class="sbtn '+(u2?'active':'')+'" data-act="colmod" data-i="'+i+'" data-col="c2" data-d="1">'+ic('plus',16)+'</button></div></div>'+

    var b=batteryTotals();

  return '<div class="step" id="stp-battery">'+stepHead(7,'layers','Battery','APX HV \u2014 5 kWh modules'+(a2()?', BMS incl. 5 kWh, up to 5 add\u2011ons, 1 or 2 towers':', up to 6 per input, 1 or 2 towers'),'Optional')+'<div class="step-b">'+unitTabsHTML()+gate+typeSel+capNote+inSel+build+'</div></div>';

function isoBox(x,y,fw,h,skx,sky){
  return {
    front:[[x,y],[x+fw,y],[x+fw,y-h],[x,y-h]],
    top:[[x,y-h],[x+fw,y-h],[x+fw+skx,y-h-sky],[x+skx,y-h-sky]],
    side:[[x+fw,y-h],[x+fw+skx,y-h-sky],[x+fw+skx,y-sky],[x+fw,y]]
  };
}
function ptsStr(pts){return pts.map(function(p){return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ');}
function drawIsoBox(x,y,fw,h,skx,sky,cFront,cTop,cSide,lit){
  var b=isoBox(x,y,fw,h,skx,sky);
  var cls='eqbox'+(lit?' lit':'');
  var s='<g class="'+cls+'">';
  s+='<polygon class="eqtop" points="'+ptsStr(b.top)+'" fill="'+cTop+'"></polygon>';
  s+='<polygon class="eqside" points="'+ptsStr(b.side)+'" fill="'+cSide+'"></polygon>';
  s+='<polygon class="eqfront" points="'+ptsStr(b.front)+'" fill="'+cFront+'"></polygon>';
  s+='</g>';
  return s;
}
function commercialSceneHTML(){
  var bom=buildBOM();
  var has=function(g){return bom.some(function(r){return r.g===g;});};
  var invOn=has('Inverter'),batOn=has('Battery'),backOn=has('Backup'),onlOn=has('Connectivity');
  var metOn=has('Metering')||state.dongle==='shinesem';
  var f=fam();
  var W=748,H=575;
  var towers=[];
  if(batOn&&f){
    if(f.battery==='APX'){
      state.inputs.forEach(function(inp){
        if(inp.cols===2){towers.push({mods:inp.c1,bms:true});towers.push({mods:inp.c2,bms:false});}
        else towers.push({mods:inp.mods,bms:true});

      state.inputs.forEach(function(inp){towers.push({mods:inp.modules,bms:false,axe:true});});

    '<defs><linearGradient id="csky2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#cfe3d3"></stop><stop offset="1" stop-color="#b9d6bd"></stop></linearGradient>'+
    '<linearGradient id="floorgrad" x1="0" y1="'+floorBL[1]+'" x2="0" y2="'+floorFL[1]+'" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#aab3ba"></stop><stop offset="1" stop-color="#8c959d"></stop></linearGradient></defs>'+
    '<rect x="0" y="0" width="'+W+'" height="'+H+'" fill="url(#csky2)"></rect>'+
    '<polygon points="0,300 260,268 748,292 748,575 0,575" fill="#a9cbaf" opacity=".55"></polygon>'+
    '<polygon points="'+ptsStr([floorFL,floorFR,floorBR,floorBL])+'" fill="url(#floorgrad)"></polygon>'+
    '<polygon points="'+floorFL[0]+','+floorFL[1]+' '+floorFR[0]+','+floorFR[1]+' '+floorFR[0]+','+(floorFR[1]+12)+' '+floorFL[0]+','+(floorFL[1]+12)+'" fill="#767f86"></polygon>'+
    '<polygon points="'+floorFR[0]+','+floorFR[1]+' '+floorBR[0]+','+floorBR[1]+' '+floorBR[0]+','+(floorBR[1]+12)+' '+floorFR[0]+','+(floorFR[1]+12)+'" fill="#6d767d"></polygon>'+

    '</svg>';

     '<line x1="'+poleX+'" y1="'+(poleTop+9)+'" x2="'+poleX+'" y2="'+poleTop+'"></line>'+
     '<line x1="'+(poleX+14)+'" y1="'+(poleTop+9)+'" x2="'+(poleX+14)+'" y2="'+poleTop+'"></line>'+
     '<path class="cable" d="M'+poleX+','+(poleTop+10)+' Q'+(poleX-12)+','+((poleTop+meterY)/2)+' '+meterX+','+(meterY-11)+'"></path>'+
     '<path class="cable" d="M'+invAttachX+','+invAttachY+' Q'+((invAttachX+meterX)/2)+','+(Math.min(invAttachY,meterY)-70)+' '+(meterX-9)+','+meterY+'"></path>'+
     '<rect x="'+(meterX-8)+'" y="'+(meterY-10.5)+'" width="16" height="21" rx="3" fill="#f4f6f9" stroke="#33da7a" stroke-width="1.5"></rect>'+
     '<circle cx="'+meterX+'" cy="'+meterY+'" r="4" fill="none" stroke="#2c9d5e" stroke-width="1.4"></circle></g>';

  function gauge(cx,cy,r,lit){

        s+=screw(ix+6,baseY-ih+6)+screw(ix+iw-6,baseY-ih+6)+screw(ix+6,baseY-6)+screw(ix+iw-6,baseY-6);
      } else {
        s+=drawIsoBox(ix,baseY,iw,ih,skx,sky,'#eef1f5','#f8fbfd','#c7cfd9',true);
        s+='<circle cx="'+(ix+iw/2)+'" cy="'+(baseY-ih+22)+'" r="5" fill="#33da7a"></circle>';
        s+='<line x1="'+(ix+8)+'" y1="'+(baseY-20)+'" x2="'+(ix+iw-8)+'" y2="'+(baseY-20)+'" stroke="#c3ccd7" stroke-width="2"></line>';

  if(!isRise){

  }
  s+='<div class="complabel'+(metOn?' lit':'')+'" style="left:'+((meterX-14)/W*100).toFixed(1)+'%;top:'+(((meterY+22)/H)*100).toFixed(1)+'%">METER</div>';
  s+='<div class="gridchip'+(metOn?' lit':'')+'" style="left:'+((poleX+2)/W*100).toFixed(1)+'%;top:'+(((poleTop-14)/H)*100).toFixed(1)+'%">GRID</div>';
  s+='<div class="complabel'+(backOn?' lit':'')+'" style="left:8%;top:88%">BACKUP</div>';
  s+='<div class="complabel'+(onlOn?' lit':'')+'" style="left:8%;top:80%">ONLINE</div>';
  s+='</div></div>';
  return s;
}

  return commercialSceneHTML();
}
function cartHTML(){
  var bom=buildBOM(),bkwh=totalBatteryKwh(),items=bom.reduce(function(s,r){return s+r.qty;},0);
  var body;
  if(bom.length===0){
    body='<div class="empty"><div class="big">'+ic('cart',22)+'</div><div class="t">Your system is empty</div><div class="s">Start by choosing an inverter \u2014 items are added here as you go.</div></div>';
  } else {
    var warn=selInvalid()?'<div class="pverr" style="margin-bottom:10px">'+ic('alert',15)+'Inverter too small for '+totalKWp()+' kWp \u2014 fix in step 3.</div>':'';
    var groups=GROUP_ORDER.filter(function(g){return bom.some(function(r){return r.g===g;});});
    var rows=groups.map(function(g){var gi=GICON[g]||'cart';
      return '<div class="gh">'+g+'</div>'+bom.filter(function(r){return r.g===g;}).map(function(r){var p=r.item.split('|'),red=(g==='Inverter'&&selInvalid());
        return '<div class="citem'+(red?' citem-red':'')+'"><span class="cico">'+ic(gi,15)+'</span><span class="cname">'+p[0]+(p[1]?'<small>'+p[1]+'</small>':'')+'</span><span class="cqty">\u00d7'+r.qty+'</span></div>';}).join('');
    }).join('');
    var caps='<div class="capstrip"><div><div class="cl">Battery</div><div class="cv">'+bkwh+' kWh</div></div><div><div class="cl">Solar</div><div class="cv" style="'+(pvOver()?'color:var(--red)':'')+'">'+totalKWp()+' kWp</div></div><div><div class="cl">DC/AC</div><div class="cv" style="'+(pvOver()?'color:var(--red)':'')+'">'+(state.kw?Math.round(pvRatio()):0)+'%</div></div></div>';
    body=warn+rows+caps;
  }
  return '<div class="cart-h"><span class="ch-t">'+ic('cart',17)+' Your system</span><span class="count-badge">'+items+' item'+(items===1?'':'s')+'</span></div>'+
    '<div class="cart-items">'+body+'</div>'+
    '<div class="cart-foot"><button class="btn primary" style="flex:1;justify-content:center" data-act="print">'+ic('printer',15)+'Print BOM</button><button class="btn" id="copyBtn" data-act="copy">'+ic('copy',15)+'Copy</button></div>'+
    '<div class="cart-disc"><span class="i">'+ic('info',13)+'</span><span>1 BMS per battery input, 1 base per tower, series cable per split (not CANbus). 200% PV cap. APX 1.0: max 2 battery inputs; APX 2.0: up to 3. AC breaker per Growatt recommendation \u2014 verify with your distributor &amp; the current Growatt manual.</span></div>';
}
function cartbarHTML(){var bkwh=totalBatteryKwh(),items=buildBOM().reduce(function(s,r){return s+r.qty;},0);
  return '<button class="bar-main" data-act="tocart">'+ic('cart',16,'var(--grnD)')+'<span><b>'+items+'</b> item'+(items===1?'':'s')+(bkwh?' \u00b7 '+bkwh+' kWh':'')+'</span></button><button class="btn primary" data-act="print">'+ic('printer',15)+'Print</button>';}
function printRecapHTML(){syncUnit();var saved=snapshotUnit();
  function rr(k,v){return '<div class="rr"><span class="k">'+k+'</span><span class="v">'+v+'</span></div>';}
  var out='<div class="printrecap">';
  out+=rr('Segment',state.segment==='res'?'Residential':state.segment==='com'?'Commercial':'(not chosen)');
  out+=rr('Solar',state.panelCount+' x '+state.panelW+' Wp = '+totalKWp()+' kWp'+(sumKw()?' \u00b7 DC/AC '+Math.round(pvRatio())+'%':''));
  state.units.forEach(function(u,i){loadUnit(u);var lbl=state.units.length>1?'Inverter '+(i+1):'Inverter';
    var inv=state.family&&state.kw?'Growatt '+fam().name+' '+state.kw+' kW':'(not selected)';
    var b=batteryTotals();
    var bat=(state.family&&fam().battery==='RISE')?(state.kw?'RISE integrated 261 kWh':'\u2014'):(state.inputs.length?(isAxeFam()?('AXE \u00b7 '+b.inputs+' cab \u00b7 '+b.kwh+' kWh'):('APX '+state.apx+' \u00b7 '+b.kwh+' kWh')):'(none)');
    out+=rr(lbl,inv+' \u00b7 battery: '+bat);
  });
  loadUnit(saved);
  out+=rr('Connectivity',state.dongle?DONGLES[state.dongle].name:'(none)');
  out+=rr('Metering',state.metering==='meter'?'Smart Meter '+state.meterType:(state.dongle==='shinesem'?'Included in ShineSEM-X':'(none)'));
  return out+'</div>';}
function aiPageHTML(){
  function card(icn,title,body){return '<div class="ai-card"><div class="ic">'+ic(icn,18)+'</div><h3>'+title+'</h3><p>'+body+'</p></div>';}
  function step(title,body){return '<div class="ai-step"><div class="n"></div><div class="tx"><b>'+title+'</b><p>'+body+'</p></div></div>';}
  function req(icn,title,body){return '<div class="row"><span class="ic">'+ic(icn,17)+'</span><div><b>'+title+'</b><p>'+body+'</p></div></div>';}
  var countries=['Sweden','Germany','Netherlands','Belgium','Denmark','Finland','France','Norway','Spain','Portugal','Austria','Czech Republic','Hungary','United Kingdom','Slovakia','Estonia','Latvia','Lithuania','Poland'];
  var pills=countries.map(function(c){return '<span class="ai-pill">'+c+'</span>';}).join('');
  return '<div class="aipage">'+
    '<div class="ai-hero"><button class="ai-back" data-act="goback">'+ic('plug',13)+'<span>\u2190 Back to System Designer</span></button>'+
      '<div class="ai-badge">'+ic('cpu',13)+'GROWATT AI</div>'+
      '<h1>Smart Scheduling Mode</h1>'+
      '<p class="ai-tag">An AI\u2011powered scheduling assistant that reads tomorrow\u2019s electricity prices and the weather, then automatically charges and discharges the battery at the most profitable moments \u2014 no manual timers needed.</p>'+
    '</div>'+
    '<div class="ai-body">'+
      '<div class="ai-section"><h2>What it actually does</h2>'+
      '<p class="ai-lead">Smart Scheduling Mode combines local weather history, the household\u2019s own consumption pattern, and day\u2011ahead spot electricity prices to forecast generation and load. From that, it builds a charge/discharge plan automatically: buy power when it\u2019s cheap, use or sell it when it\u2019s expensive. It also knows to stop exporting during negative\u2011price periods so the customer never pays to feed the grid. The system needs about <b>4 weeks</b> of learning the household\u2019s habits before scheduling is fully tuned to that specific home.</p>'+
      '<div class="ai-grid">'+
        card('battery','More from the PV','Prioritises household loads when prices are high, sells surplus when export pays well, and stores the rest \u2014 instead of a fixed self\u2011consumption rule.')+
        card('activity','Lower bills automatically','Charges the battery during cheap hours and draws from it during expensive ones, without the customer touching a setting.')+
        card('cpu','Real\u2011time dispatch','Continuously balances weather, historical generation, consumption and live prices to keep the system running at its optimum.')+
        card('shield','Handles negative prices','Automatically pauses grid export when the export tariff goes negative, and resumes once it\u2019s positive again.')+
      '</div></div>'+
      '<div class="ai-section"><h2>Two ways to run it</h2>'+
      '<div class="ai-modes-grid">'+
        '<div class="ai-mode auto"><span class="tag">Hands\u2011off</span><h3>Automatic mode</h3><p>The system runs the whole day on its own using the live price curve, aiming for maximum profit. Enable it, choose <b>Automatic</b>, and confirm \u2014 nothing else to configure.</p></div>'+
        '<div class="ai-mode man"><span class="tag">Custom thresholds</span><h3>Manual mode</h3><p>The installer or customer sets their own <b>import (cheap)</b> and <b>export (expensive)</b> price levels. The system charges below the import price, discharges above the export price, and runs normal self\u2011consumption in between.</p></div>'+
      '</div></div>'+
      '<div class="ai-section"><h2>Export limits &amp; breaker protection</h2>'+
      '<p class="ai-lead">Three export settings are available: <b>Off</b> (feed in freely), <b>On</b> (never export), or <b>Automatic</b> (stop only while the export tariff is negative). A separate <b>peak\u2011shaving import limit</b> can also be set so that battery charging plus household load never exceeds the main breaker\u2019s safe rating \u2014 avoiding a tripped fuse during cheap\u2011price charging windows.</p></div>'+
      '<div class="ai-section"><h2>Getting it running</h2><div class="ai-steps">'+
        step('Confirm firmware &amp; location','If the inverter, smart meter and datalogger versions meet the requirements and the site is in a supported market, the feature appears automatically in the portal \u2014 the customer just switches it on.')+
        step('Pick the price data source','Growatt uses Nord Pool or the local energy exchange for day\u2011ahead prices; UK sites can also use Octopus tariff data.')+
        step('Set grid fees &amp; VAT','Add the local grid fee and VAT on import/export so the plan reflects the customer\u2019s real cost, not just the raw market price. Defaults to 0 (market price only) until set.')+
        step('Choose Automatic or Manual','Automatic for a fully hands\u2011off setup, or Manual to set fixed import/export price thresholds.')+
        step('Optional: export limit &amp; peak shaving','Layer on an export‑limitation rule and/or an import cap sized to the customer\u2019s main breaker.')+
      '</div></div>'+
      '<div class="ai-section"><h2>Where it\u2019s available today</h2><div class="ai-pillrow">'+pills+'</div></div>'+
      '<div class="ai-section"><h2>What\u2019s needed</h2><div class="ai-req">'+
        req('cpu','Compatible inverter + smart meter + datalogger','Growatt maintains a list of supported inverter families and minimum firmware/datalogger versions \u2014 check the device card in the portal, or ask your distributor if a specific serial qualifies.')+
        req('wifi','A recent firmware version','If a device is below the required version, contact the regional after\u2011sales engineer to get it upgraded before enabling the mode.')+
        req('activity','A supported market','Sweden is on the list above \u2014 the mode relies on day\u2011ahead price data that\u2019s only published in these regions today.')+
      '</div></div>'+
      '<div class="ai-foot">Summarised from Growatt\u2019s \u201cAI\u2011Powered Energy Assistant: Smart Scheduling Mode\u201d technical white paper. Always confirm current device support with your distributor before quoting a customer.</div>'+
    '</div></div>';
}
function render(){
  if(state.page==='ai'){
    document.getElementById('app').innerHTML='<div class="page">'+aiPageHTML()+'</div>';
    window.scrollTo({top:0,behavior:'instant'});
    return;
  }
  var html='<div class="page">'+
    '<div class="topbar"><div class="logo">'+ic('zap',19,'#fff')+'</div><div><h1>GrowattDesign</h1><div class="sub">Growatt \u00b7 MOD / MID / WIT + APX &amp; AXE</div><div class="accentbar"><span></span><span></span><span></span></div></div></div>'+
    '<div class="printhead"><div class="pt">Growatt Energy System \u2014 Bill of Materials</div><div class="pd">'+new Date().toLocaleDateString()+'</div></div>'+
    printRecapHTML()+
    '<div class="layout"><div class="stepcol">'+segStep()+panelStep()+invStep()+dongleStep()+meterStep()+backupStep()+batteryStep()+'</div>'+
    '<aside class="cartcol">'+housePhotoHTML()+'<div class="cart" id="cart">'+cartHTML()+'</div></aside></div>'+
    '<div class="cartbar" id="cartbar">'+cartbarHTML()+'</div></div>';
  document.getElementById('app').innerHTML=html;
}
function onPanels(){
  if(state.family&&state.kw&&state.panelCount>0&&!kwValid(state.kw)){var v=fam().kw.filter(kwValid);if(v.length)state.kw=v[0];}
  var a=document.getElementById('pvTop');if(a)a.innerHTML=pvTopHTML();
  var b=document.getElementById('invStepBody');if(b)b.innerHTML=invStepBodyHTML();
  var c=document.getElementById('cart');if(c)c.innerHTML=cartHTML();
  var d=document.getElementById('cartbar');if(d)d.innerHTML=cartbarHTML();
}
document.addEventListener('click',function(e){
  var el=e.target.closest&&e.target.closest('[data-act]');if(!el)return;var a=el.getAttribute('data-act');
  if(a==='fam'){var k=el.getAttribute('data-k');if(!famValid(k))return;state.family=k;var f=FAMILIES[k];var v=f.kw.filter(kwValid);state.kw=v.length?v[0]:f.kw[0];state.inputs=(f.battery==='MODA')?state.inputs:state.inputs.slice(0,f.inputs);if(f.battery==='MODA')state.wantBattery=true;clampInputs();render();}
  else if(a==='kw'){var p=+el.getAttribute('data-p');if(!kwValid(p))return;state.kw=p;render();goStep('stp-online');}
  else if(a==='seg'){var sg=el.getAttribute('data-s');state.segment=sg;syncUnit();
    state.units.forEach(function(u){if(u.family&&FAMILIES[u.family].seg!==sg){u.family=null;u.kw=null;u.inputs=[];u.wantBattery=null;}});
    loadUnit(state.units[state.unit]);render();goStep('stp-panel');}
  else if(a==='multi'){state.multi=!state.multi;if(state.multi&&state.dongle!=='shinesem'&&state.dongle!=='shinemaster')state.dongle=null;if(!state.multi){syncUnit();state.units=[state.units[state.unit]];state.unit=0;loadUnit(state.units[0]);}render();}
  else if(a==='unit'){switchUnit(+el.getAttribute('data-i'));render();}
  else if(a==='unitadd'){addUnit();render();}
  else if(a==='unitdel'){removeUnit(+el.getAttribute('data-i'));render();}
  else if(a==='goai'){state.page='ai';render();}
  else if(a==='goback'){state.page='main';render();}
  else if(a==='dongle'){var k=el.getAttribute('data-k');var wasNull=!state.dongle;state.dongle=(state.dongle===k)?null:k;render();if(state.dongle)goStep('stp-meter');}
  else if(a==='metering'){var m=el.getAttribute('data-m');state.metering=(state.metering===m)?null:m;render();if(state.metering)goStep('stp-backup');}
  else if(a==='mt'){state.meterType=el.getAttribute('data-t');render();}
  else if(a==='backup'){state.backupOn=!state.backupOn;render();goStep('stp-battery');}
  else if(a==='apx'){state.apx=el.getAttribute('data-v');clampInputs();render();}
  else if(a==='inputs'){var n=+el.getAttribute('data-n');if(n>fam().inputs)return;if(!isAxeFam()&&n>maxInputs())return;var axe=isAxeFam();while(state.inputs.length<n)state.inputs.push(axe?{modules:6}:{mods:4,cols:1,c1:4,c2:0});state.inputs=state.inputs.slice(0,n);clampInputs();render();}
  else if(a==='mod'){var j=+el.getAttribute('data-i'),dd=+el.getAttribute('data-d');var inp=state.inputs[j];var cur=(typeof inp.mods==='number'&&!isNaN(inp.mods))?inp.mods:minMods();inp.mods=clamp(cur+dd,minMods(),maxMods());inp.c1=inp.mods;inp.c2=0;render();}
  else if(a==='colmod'){var j=+el.getAttribute('data-i'),col=el.getAttribute('data-col'),dd=+el.getAttribute('data-d');var inp=state.inputs[j],mx=maxMods();
    if(col==='c1'){var nv=inp.c1+dd;if(dd>0){if(nv+inp.c2<=mx)inp.c1=nv;}else{if(nv>=(a2()?0:1))inp.c1=nv;}}
    else{var nv2=inp.c2+dd;if(dd>0){if(inp.c1+nv2<=mx)inp.c2=nv2;}else{if(nv2>=1)inp.c2=nv2;}}
    inp.mods=inp.c1+inp.c2;render();}
  else if(a==='axemod'){var j=+el.getAttribute('data-i'),dd=+el.getAttribute('data-d');var inp=state.inputs[j];inp.modules=clamp(inp.modules+dd,1,AXE_MAX_MODULES);render();}
  else if(a==='modamod'){var dd=+el.getAttribute('data-d');if(!state.inputs[0])state.inputs=[{modules:3}];state.inputs[0].modules=clamp(state.inputs[0].modules+dd,1,6);render();}
  else if(a==='cols'){var j=+el.getAttribute('data-i'),cc=+el.getAttribute('data-c');var inp=state.inputs[j];
    if(cc===2){var need=a2()?1:2;if(inp.mods<need)return;inp.cols=2;
      if(a2()){inp.c2=Math.max(1,Math.floor(inp.mods/2));inp.c1=inp.mods-inp.c2;}
      else{inp.c1=Math.ceil(inp.mods/2);inp.c2=Math.floor(inp.mods/2);if(inp.c1<1)inp.c1=1;if(inp.c2<1)inp.c2=1;}}
    else{inp.cols=1;inp.mods=inp.c1+inp.c2;}
    render();}
  else if(a==='wantbat'){var v=el.getAttribute('data-v');state.wantBattery=(v==='yes');
    if(v==='no')state.inputs=[];
    else if(v==='yes'&&state.inputs.length===0){var axe0=isAxeFam();state.inputs=[axe0?{modules:6}:{mods:4,cols:1,c1:4,c2:0}];clampInputs();}
    render();}
  else if(a==='print'){window.print();}
  else if(a==='tocart'){var cc2=document.getElementById('cart');if(cc2)cc2.scrollIntoView({behavior:'smooth',block:'start'});}
  else if(a==='copy'){var t=buildText();function done(){var btn=document.getElementById('copyBtn');if(btn){btn.innerHTML=ic('check',15)+'Copied';btn.classList.add('ok');setTimeout(function(){if(btn){btn.innerHTML=ic('copy',15)+'Copy';btn.classList.remove('ok');}},1600);}}if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(done).catch(function(){fb(t,done);});}else fb(t,done);}
});
function fb(t,d){var ta=document.createElement('textarea');ta.value=t;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');}catch(e){}document.body.removeChild(ta);d();}
document.addEventListener('input',function(e){
  if(e.target.id==='panelW'){state.panelW=clamp(parseInt(e.target.value||'0',10)||0,0,800);onPanels();}
  else if(e.target.id==='panelCount'){state.panelCount=clamp(parseInt(e.target.value||'0',10)||0,0,400);onPanels();}
});
render();
</script>
