
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Growatt APX System Designer</title>
<style>
  :root{
    --bg:#eef2f7; --card:#ffffff; --card2:#f7f9fc; --line:#e3e8f1; --line2:#cfd8e6;
    --text:#0f1b2d; --mut:#5d6b85; --faint:#8a97ad;
    --grn:#15a34a; --grnD:#11823b; --grnBg:#eafaf0; --grnLine:#bfe9cd;
    --amb:#b9740a; --ambBg:#fdf5e6; --ambLine:#f1d9a3;
    --red:#d92d2d; --redBg:#fdecec; --redLine:#f5c2c2;
    --slate:#475569;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --shadow:0 1px 2px rgba(16,27,45,.04),0 6px 18px rgba(16,27,45,.06);
    --sbw:366px; --sbgap:16px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.45}
  .page{max-width:1180px;margin:0 auto;padding:22px 14px 96px}
  .topbar{display:flex;align-items:center;gap:11px;margin-bottom:18px}
  .logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#1fc15c,#11823b);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow)}
  .topbar h1{font-size:20px;font-weight:750;margin:0;letter-spacing:-.01em}
  .topbar .sub{color:var(--mut);font-size:12.5px;margin-top:2px}
  .btn{display:inline-flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--line2);color:var(--text);padding:9px 13px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
  .btn.primary{background:var(--grn);border-color:var(--grn);color:#fff}
  .btn.ok{background:var(--grnD);border-color:var(--grnD);color:#fff}
  .layout{display:block}
  @media(min-width:980px){.layout{padding-right:calc(var(--sbw) + var(--sbgap))}}
  .stepcol{display:flex;flex-direction:column;gap:14px;min-width:0}
  .step{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
  .step-h{display:flex;align-items:center;gap:11px;padding:15px 17px;border-bottom:1px solid var(--line)}
  .num{width:26px;height:26px;flex-shrink:0;border-radius:50%;background:var(--grnBg);border:1px solid var(--grnLine);color:var(--grnD);font-weight:750;font-size:13px;display:flex;align-items:center;justify-content:center}
  .step-h .ttl{font-weight:700;font-size:15px}
  .step-h .desc{font-size:12px;color:var(--mut);margin-top:1px}
  .step-b{padding:17px}
  .grid{display:grid;gap:10px}
  .g2{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:repeat(3,1fr)}
  @media(max-width:560px){.g3{grid-template-columns:1fr 1fr}}
  .opt{text-align:left;border:1px solid var(--line2);background:var(--card2);border-radius:12px;padding:12px 13px;cursor:pointer;font-family:inherit;color:var(--text)}
  .opt.on{border-color:var(--grn);background:var(--grnBg);box-shadow:inset 0 0 0 1px var(--grn)}
  .opt .name{font-weight:700;font-size:14px}
  .opt.on .name{color:var(--grnD)}
  .opt .meta{font-size:11.5px;color:var(--mut);margin-top:3px}
  .opt.crossed{opacity:.55;cursor:not-allowed;background:#f1f4f8}
  .opt.crossed .name{text-decoration:line-through;color:var(--faint)}
  .opt.invalidsel{border-color:var(--red);box-shadow:inset 0 0 0 1px var(--red)}
  .opt .x{color:var(--red);font-weight:700;font-size:10.5px;margin-top:6px;display:flex;align-items:center;gap:4px}
  .badge{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:20px;margin-top:7px}
  .badge.g{background:var(--grnBg);color:var(--grnD);border:1px solid var(--grnLine)}
  .badge.a{background:var(--ambBg);color:var(--amb);border:1px solid var(--ambLine)}
  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{border:1px solid var(--line2);background:var(--card2);border-radius:9px;padding:8px 13px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--text)}
  .chip.on{border-color:var(--grn);background:var(--grn);color:#fff}
  .chip.sm{padding:6px 11px;font-size:12.5px}
  .chip.crossed{opacity:.5;cursor:not-allowed;text-decoration:line-through;color:var(--faint);background:#f1f4f8;border-color:var(--line)}
  .note{display:flex;gap:8px;margin-top:12px;font-size:12px;color:var(--mut);line-height:1.5;background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  .note .i{color:var(--amb);flex-shrink:0;margin-top:1px}
  .note b{color:var(--text)}
  .sublabel{font-size:12px;color:var(--mut);font-weight:600;margin:14px 0 8px}
  .optbadge{display:inline-block;font-size:10.5px;font-weight:700;color:var(--mut);background:var(--card2);border:1px solid var(--line2);border-radius:20px;padding:2px 8px;margin-left:8px;vertical-align:middle}
  .pvtop{margin-top:14px;background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:14px 15px}
  .pvtop.over{background:var(--redBg);border-color:var(--redLine)}
  .pvrow{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .pvbig{font-family:var(--mono);font-size:28px;font-weight:800;color:var(--grnD)}
  .pvbig small{font-size:14px;color:var(--mut);font-weight:500}
  .pvhint{font-size:12.5px;color:var(--mut);display:flex;align-items:center;gap:7px;line-height:1.4}
  .pvhint b{color:var(--text)}
  .gauge{margin-top:13px}
  .gtop{display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin-bottom:6px}
  .gnum{font-family:var(--mono);font-size:22px;font-weight:800;color:var(--grnD);flex-shrink:0}
  .gnum.over{color:var(--red)}
  .ghead{font-size:11.5px;color:var(--mut);text-align:right;line-height:1.35}
  .ghead b{color:var(--text)}
  .gtrack{position:relative;height:13px;background:#e3e9f2;border-radius:7px;overflow:hidden}
  .gfill{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,#22b85b,#15a34a);transition:width .3s;border-radius:7px}
  .gfill.over{background:linear-gradient(90deg,#e8863a,#d92d2d)}
  .gmid{position:absolute;top:0;bottom:0;left:50%;width:1px;background:rgba(15,27,45,.14)}
  .gscale{display:flex;justify-content:space-between;font-size:9.5px;color:var(--faint);margin-top:4px;font-family:var(--mono)}
  .locked{display:flex;align-items:center;gap:11px;background:var(--grnBg);border:1px solid var(--grnLine);border-radius:12px;padding:14px 15px}
  .locked .ico{color:var(--grnD);flex-shrink:0}
  .locked .t{font-weight:700;font-size:14px;color:var(--grnD)}
  .locked .s{font-size:12px;color:var(--grnD);opacity:.85;margin-top:2px}
  .reqcard{display:flex;align-items:center;gap:11px;background:var(--ambBg);border:1px solid var(--ambLine);border-radius:12px;padding:14px 15px}
  .reqcard .ico{color:var(--amb);flex-shrink:0}
  .reqcard .t{font-weight:700;font-size:14px;color:var(--amb)}
  .reqcard .s{font-size:12px;color:#7a5a18;margin-top:2px}
  .placeholder{display:flex;align-items:center;gap:9px;background:var(--card2);border:1px dashed var(--line2);border-radius:12px;padding:15px;color:var(--mut);font-size:13px}
  .placeholder .i{color:var(--faint);flex-shrink:0}
  .notice{display:flex;gap:8px;margin-top:11px;font-size:12px;line-height:1.5;border-radius:10px;padding:10px 12px}
  .notice.g{background:var(--grnBg);border:1px solid var(--grnLine);color:var(--grnD)}
  .notice.g .i{color:var(--grnD);flex-shrink:0;margin-top:1px}
  .notice b{color:var(--text)}
  .switchrow{display:flex;align-items:center;justify-content:space-between;background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;gap:12px}
  .switchrow .lab{font-size:13.5px;font-weight:600}
  .switchrow .s2{font-size:11.5px;color:var(--mut);margin-top:2px}
  .sw{width:46px;height:26px;border-radius:20px;background:#cdd6e4;position:relative;transition:.15s;flex-shrink:0;cursor:pointer}
  .sw.on{background:var(--grn)}
  .knob{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.15s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
  .sw.on .knob{left:23px}
  .tower{border:1px solid var(--line2);border-radius:13px;padding:13px;background:var(--card2)}
  .tower+.tower{margin-top:11px}
  .tower-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
  .tower-h .nm{font-weight:700;font-size:13.5px;display:flex;align-items:center;gap:7px}
  .tower-h .kw{font-family:var(--mono);color:var(--grnD);font-weight:700;font-size:13.5px}
  .batlabel{font-size:11px;font-weight:800;color:var(--slate);background:#e7ecf4;border:1px solid var(--line2);border-radius:7px;padding:2px 8px;letter-spacing:.03em}
  .stepper{display:flex;align-items:center;gap:9px}
  .sbtn{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;border:1px solid var(--line2);background:#fff;color:#c2cad8;cursor:default}
  .sbtn.active{color:var(--text);cursor:pointer}
  .sval{min-width:24px;text-align:center;font-family:var(--mono);font-size:18px;font-weight:700}
  .modrow{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .modrow+.modrow{margin-top:9px}
  .modrow .lab{font-size:12.5px;color:var(--mut);font-weight:600}
  .modrow .lab b{color:var(--text)}
  .totrow{font-size:11.5px;color:var(--mut);margin-top:9px;font-family:var(--mono)}
  .totrow b{color:var(--grnD)}
  .diagram{margin-top:13px}
  .cols{display:flex;gap:11px;align-items:flex-end}
  .col{flex:1;min-width:70px;max-width:130px}
  .blk{display:flex;align-items:center;justify-content:space-between;padding:0 9px;font-size:10.5px;font-family:var(--mono);font-weight:600;border-radius:8px}
  .mod{height:30px;background:linear-gradient(180deg,#22b85b,#16933f);color:#fff;margin-top:6px;box-shadow:0 1px 2px rgba(16,27,45,.12)}
  .pm{height:30px;background:linear-gradient(180deg,#64748b,#475569);color:#fff;box-shadow:0 1px 2px rgba(16,27,45,.12)}
  .pmb{height:34px;background:linear-gradient(180deg,#3f9c66,#2c6f49);color:#fff;box-shadow:0 1px 2px rgba(16,27,45,.16);border:1px solid rgba(255,255,255,.25)}
  .base{height:12px;border-radius:6px;background:#dde4ee;border:1px solid var(--line2);color:var(--faint);font-size:9.5px}
  .kaskad{display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--amb);font-size:8.5px;font-weight:700;padding-bottom:24px;min-width:34px}
  .bases{display:flex;gap:11px;margin-top:6px;align-items:center}
  .axecab{position:relative;width:100%;max-width:170px;height:74px;border-radius:9px;background:#dde4ee;border:1px solid var(--line2);overflow:hidden;display:flex;align-items:flex-end}
  .axecab-fill{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(180deg,#3f9c66,#2c6f49);transition:height .25s}
  .axecab-lbl{position:relative;z-index:1;display:flex;align-items:center;gap:6px;color:#fff;font-size:11px;font-weight:700;font-family:var(--mono);padding:9px;text-shadow:0 1px 2px rgba(0,0,0,.4)}
  .field{display:flex;flex-direction:column;gap:6px}
  .field label{font-size:12px;font-weight:600;color:var(--mut)}
  .field input{border:1px solid var(--line2);border-radius:10px;padding:11px 12px;font-size:16px;font-family:var(--mono);font-weight:700;color:var(--text);background:#fff;width:100%}
  .field input:focus{outline:none;border-color:var(--grn);box-shadow:0 0 0 3px var(--grnBg)}
  .field .unit{font-size:11px;color:var(--faint);font-weight:500}
  .pverr{display:flex;align-items:center;gap:8px;background:var(--redBg);border:1px solid var(--redLine);color:var(--red);border-radius:10px;padding:11px 13px;font-size:12.5px;font-weight:600}

  /* ===== Right sidebar: fixed on desktop, 30% photo / 70% cart ===== */
  .cartcol{margin-top:14px}
  @media(min-width:980px){
    .cartcol{
      position:fixed; top:16px;
      right:max(14px, calc(50vw - 576px));
      width:var(--sbw); height:calc(100vh - 32px);
      display:flex; flex-direction:column;
      z-index:40; margin-top:0;
    }
  }
  .housephoto{position:relative;flex-shrink:0;background:var(--card);border-radius:16px 16px 0 0;box-shadow:var(--shadow);overflow:hidden}
  .photostage{position:relative;width:100%;font-size:0;line-height:0}
  .photostage img.hbase{display:block;width:100%;height:auto}
  .oline{position:absolute;border:2px solid #33da7a;border-radius:8px;box-shadow:0 0 12px rgba(51,218,122,.55),inset 0 0 7px rgba(51,218,122,.22);opacity:0;transition:opacity .35s ease;pointer-events:none;box-sizing:border-box}
  .oline.lit{opacity:1;animation:olpulse 2.4s ease-in-out infinite}
  @keyframes olpulse{0%,100%{box-shadow:0 0 12px rgba(51,218,122,.55),inset 0 0 8px rgba(51,218,122,.2)}50%{box-shadow:0 0 4px rgba(51,218,122,.25),inset 0 0 3px rgba(51,218,122,.1)}}
  .btower{position:absolute;pointer-events:none;filter:drop-shadow(0 4px 5px rgba(0,0,0,.5));animation:slidein .3s ease}
  .meterimg{position:absolute;pointer-events:none;filter:grayscale(1);opacity:.22;transition:filter .3s,opacity .3s}
  .meterimg.lit{filter:none;opacity:1}
  .photocap{position:absolute;left:0;right:0;bottom:0;display:flex;gap:6px;padding:8px 9px;background:linear-gradient(0deg,rgba(4,9,20,.72),transparent)}
  .pmini{flex:1;display:flex;align-items:center;justify-content:center;gap:4px;padding:5px 2px;border-radius:7px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);color:#8b97ac;opacity:.55;filter:grayscale(1);transition:.25s;font-size:9px;font-weight:750;letter-spacing:.02em;text-transform:uppercase}
  .pmini.lit{opacity:1;filter:none;color:#8ffcb8;background:rgba(70,230,140,.2);border-color:rgba(70,230,140,.5)}
  .cart{background:var(--card);border:1px solid var(--line);border-top:none;border-radius:0 0 16px 16px;box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column}
  @media(min-width:980px){.cart{flex:1 1 auto;min-height:0}}
  .cart-h{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--line);background:var(--card2);flex-shrink:0}
  .ch-t{font-weight:750;font-size:15px;display:flex;align-items:center;gap:8px}
  .count-badge{font-size:12px;font-weight:700;background:var(--grn);color:#fff;padding:3px 10px;border-radius:20px;animation:pop .22s ease}
  @keyframes pop{0%{transform:scale(.7);opacity:.5}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
  @keyframes slidein{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
  .cart-items{flex:1 1 auto;overflow-y:auto;min-height:0;padding:12px}
  .empty{padding:30px 18px;text-align:center;color:var(--mut)}
  .empty .big{width:48px;height:48px;border-radius:50%;background:var(--card2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;color:var(--faint)}
  .empty .t{font-weight:700;font-size:14px;color:var(--text)}
  .empty .s{font-size:12.5px;margin-top:4px}
  .gh{font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);font-weight:700;margin:11px 4px 4px}
  .gh:first-child{margin-top:0}
  .citem{display:flex;align-items:center;gap:10px;padding:8px;border-radius:9px;animation:slidein .2s ease}
  .citem:hover{background:var(--card2)}
  .cico{width:30px;height:30px;flex-shrink:0;border-radius:8px;background:var(--grnBg);color:var(--grnD);display:flex;align-items:center;justify-content:center}
  .citem-red .cico{background:var(--redBg);color:var(--red)}
  .cname{flex:1;font-size:12.5px;font-weight:600;line-height:1.3;display:flex;flex-direction:column;min-width:0}
  .cname small{font-weight:400;color:var(--faint);font-size:11px}
  .cqty{font-family:var(--mono);font-weight:700;font-size:13px;color:var(--text);flex-shrink:0}
  .capstrip{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px dashed var(--line)}
  .capstrip>div{flex:1;text-align:center;background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:9px 4px}
  .capstrip .cl{font-size:10px;color:var(--mut);font-weight:600}
  .capstrip .cv{font-family:var(--mono);font-weight:750;font-size:15px;margin-top:2px}
  .cart-foot{display:flex;gap:8px;padding:12px;border-top:1px solid var(--line);flex-shrink:0}
  .cart-disc{display:flex;gap:7px;padding:0 14px 13px;font-size:10.5px;color:var(--mut);line-height:1.45;flex-shrink:0}
  .cart-disc .i{color:var(--amb);flex-shrink:0;margin-top:1px}
  .cartbar{position:fixed;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:space-between;gap:10px;background:#fff;border-top:1px solid var(--line2);padding:10px 14px;box-shadow:0 -4px 16px rgba(16,27,45,.08);z-index:50}
  .bar-main{flex:1;display:flex;align-items:center;gap:9px;background:none;border:none;font-family:inherit;font-size:13.5px;color:var(--text);cursor:pointer;text-align:left}
  .bar-main b{font-family:var(--mono)}
  @media(min-width:980px){.cartbar{display:none}}
  .printhead{display:none}.printrecap{display:none}
  @media print{
    body{background:#fff}
    .topbar,.cartbar,.stepcol,.cart-foot,.housephoto{display:none!important}
    .page{padding:0;max-width:none}.layout{display:block;padding-right:0!important}
    .cartcol{position:static!important;height:auto!important;width:auto!important}
    .cart{border-radius:8px;border-top:1px solid var(--line);box-shadow:none}
    .cart-items{overflow:visible!important}
    .count-badge,.citem{animation:none}
    .printhead{display:flex!important;align-items:center;justify-content:space-between;border-bottom:2px solid var(--text);padding-bottom:10px;margin-bottom:14px}
    .printhead .pt{font-size:18px;font-weight:750}.printhead .pd{font-size:12px;color:#555}
    .printrecap{display:block;margin-bottom:14px}
    .printrecap .rr{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid #ddd}
    .printrecap .rr .k{color:#555}.printrecap .rr .v{font-weight:700}
    *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
var MODULE_KWH=5, AXE_MODULE_KWH=5.12, AXE_MAX_MODULES=12;
var FAMILIES={
  'MOD-XH':{name:'MOD\u2011XH (BP)',phase:'3\u2011phase',backup:'box',inputs:1,battery:'APX',kw:[3,4,5,6,8,10],
    note:'Battery\u2011ready 3\u2011phase hybrid. <b>BP</b> variant required for APX. Backup needs a separate <b>SYN 100\u2011XH\u201130</b> box.'},
  'MOD-HU':{name:'MOD\u2011HU',phase:'3\u2011phase',backup:'integrated',inputs:1,battery:'APX',kw:[5,6,8,10,12,15],
    note:'3\u2011phase hybrid with <b>integrated backup</b> \u2014 no SYN box. 3 MPPT, works with APX HV.'},
  'MID-XH':{name:'MID\u2011XH',phase:'3\u2011phase',backup:'box',inputs:2,battery:'APX',kw:[15,17,20,25,30],
    note:'Larger 3\u2011phase hybrid, <b>two battery inputs</b>. Backup needs a separate <b>SYN 100\u2011XH\u201130</b> box.'},
  'MID-HU':{name:'MID\u2011HU',phase:'3\u2011phase',backup:'integrated',inputs:2,battery:'APX',kw:[15,20,25,30],
    note:'3\u2011phase hybrid with <b>integrated backup</b> and two battery inputs. Confirm availability with Aprilice/Growatt.'},
  'WIT-HU':{name:'WIT (H\u2011U)',phase:'3\u2011phase',backup:'box-required',inputs:3,battery:'APX',kw:[50,60,75,100],
    note:'Commercial 3\u2011phase hybrid with up to <b>3 battery inputs</b>, using <b>APX HV</b> storage. Backup is <b>not integrated</b> \u2014 a separate SYN box must be added. Verify exact battery\u2011input count with Aprilice.'},
  'WIT-XHU':{name:'WIT XHU',phase:'3\u2011phase',backup:'integrated',inputs:3,battery:'AXE',kw:[29.9,30,36,40,50],

function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

// APX inputs: {mods,cols,c1,c2}. AXE inputs: {modules}. Shape depends on fam().battery.
var state={panelW:450,panelCount:0,family:null,kw:null,dongle:null,metering:null,meterType:'TPM-C',backupOn:true,apx:'1.0',inputs:[],wantBattery:null};

function fam(){return state.family?FAMILIES[state.family]:null;}
function isAxeFam(){return !!(fam()&&fam().battery==='AXE');}
function backupType(){return state.family?fam().backup:null;}
function isHU(){return backupType()==='integrated';}
function needsSyn(){var b=backupType();return b==='box-required'||(b==='box'&&state.backupOn);}
function a2(){return state.apx==='2.0';}
function minMods(){return a2()?0:1;}
function maxMods(){return a2()?5:6;}
function inputKwh(inp){return (a2()?(inp.mods+1):inp.mods)*MODULE_KWH;}
function totalKWp(){return Math.round(state.panelCount*state.panelW/10)/100;}
function maxKWp(){return state.kw?state.kw*2:0;}
function pvRatio(){return state.kw?(totalKWp()/state.kw*100):0;}
function pvOver(){return state.kw&&totalKWp()>maxKWp()+1e-9;}
function kwValid(kw){return state.panelCount<=0 || totalKWp()<=2*kw+1e-9;}
function famValid(k){return FAMILIES[k].kw.some(kwValid);}
function famMaxKWp(k){return 2*Math.max.apply(null,FAMILIES[k].kw);}
function selInvalid(){return state.family&&state.kw&&state.panelCount>0&&!kwValid(state.kw);}
function synItem(){return state.family==='WIT-HU'?'Growatt SYN backup box (WIT \u2014 verify model)|separate, not integrated':'Growatt SYN 100\u2011XH\u201130|3\u2011phase backup box';}
function globalCap(){return (fam()&&fam().battery==='APX'&&fam().inputs===3&&!a2())?60:null;}
function canAddModule(){var cap=globalCap();if(cap===null)return true;return (batteryTotals().kwh+MODULE_KWH)<=cap;}
function clampInputs(){
  if(!state.family)return;
  if(isAxeFam()){
    state.inputs.forEach(function(inp){inp.modules=clamp(inp.modules,1,AXE_MAX_MODULES);});
    return;
  }
  state.inputs.forEach(function(inp){
    if(a2()){
      inp.cols=1;inp.mods=clamp(inp.mods,0,5);inp.c1=inp.mods;inp.c2=0;
    } else {
      if(inp.cols===2){
        inp.c1=clamp(inp.c1||1,1,5);inp.c2=clamp(inp.c2||1,1,5);
        if(inp.c1+inp.c2>6){if(inp.c1>=inp.c2)inp.c1=6-inp.c2;else inp.c2=6-inp.c1;}
        inp.mods=inp.c1+inp.c2;
      } else {
        inp.mods=clamp(inp.mods,1,6);inp.c1=inp.mods;inp.c2=0;
      }
    }
  });
  var cap=globalCap();
  if(cap!==null){
    var maxTotalMods=cap/MODULE_KWH,guard=0;
    while(state.inputs.reduce(function(s,i){return s+i.mods;},0)>maxTotalMods&&guard<200){
      var idx=-1,best=minMods();
      state.inputs.forEach(function(inp,i){if(inp.mods>best){best=inp.mods;idx=i;}});
      if(idx===-1)break;
      state.inputs[idx].mods-=1;state.inputs[idx].cols=1;state.inputs[idx].c1=state.inputs[idx].mods;state.inputs[idx].c2=0;
      guard++;
    }
  }
}
function batteryTotals(){
  if(isAxeFam()){
    var m=state.inputs.reduce(function(s,i){return s+i.modules;},0);
    return {mods:m,bms:0,kwh:Math.round(m*AXE_MODULE_KWH*100)/100,bases:0,cascades:0,inputs:state.inputs.length};
  }
  var mods=state.inputs.reduce(function(s,i){return s+i.mods;},0);
  var bms=state.inputs.length;
  var kwh=mods*MODULE_KWH+(a2()?bms*MODULE_KWH:0);
  var bases=state.inputs.reduce(function(s,i){return s+i.cols;},0);
  var cascades=state.inputs.filter(function(i){return i.cols===2;}).length;
  return {mods:mods,bms:bms,kwh:kwh,bases:bases,cascades:cascades,inputs:bms};
}

function buildBOM(){var map={};function add(x){if(x.qty<=0)return;var k=x.g+'|'+x.item;map[k]=map[k]||{g:x.g,item:x.item,qty:0};map[k].qty+=x.qty;}
  if(state.family&&state.kw){var f=fam();add({g:'Inverter',item:'Growatt '+f.name+' '+state.kw+' kW|'+f.phase+' hybrid',qty:1});}
  if(state.dongle)add({g:'Connectivity',item:DONGLES[state.dongle].name+'|'+DONGLES[state.dongle].desc,qty:1});
  if(state.metering==='shinesem')add({g:'Metering',item:'Growatt ShineSEM\u2011X|Smart Energy Manager',qty:1});
  else if(state.metering==='meter')add({g:'Metering',item:state.meterType==='TPM-E'?'Growatt Smart Meter TPM\u2011E|direct, 3\u2011phase':'Growatt Smart Meter TPM\u2011C|CT type (DTSU666), 3\u2011phase',qty:1});
  if(needsSyn())add({g:'Backup',item:synItem(),qty:1});
  if(state.inputs.length){var t=batteryTotals();

    var baseNote='<div class="notice g">'+ic('check',14)+'<span><b>'+b.bases+' \u00d7 APX Battery Base</b> added automatically \u2014 1 per tower.</span></div>';
    var casNote=b.cascades?'<div class="notice g">'+ic('cable',14)+'<span><b>'+b.cascades+' \u00d7 parallel cable set</b> added \u2014 links the split towers in parallel. Not a CANbus/communication cable \u2014 confirm exact spec &amp; rating with Aprilice.</span></div>':'';
    var bmsNote='<div class="note">'+ic('info',14)+'<span><b>'+b.bms+' \u00d7 BMS / Power Module</b> ('+(a2()?'each includes a 5 kWh module + heating, 1 tower each':'control unit, 1 per input')+'). Total: <b'+(atCap?' style="color:var(--amb)"':'')+'>'+totalStr+'</b> across '+b.inputs+' input'+(b.inputs>1?'s':'')+(atCap?' \u2014 60 kWh cap reached (APX 1.0, 3\u2011input inverter)':'')+'.</span></div>';
    build=cards+baseNote+casNote+bmsNote;
  }
  return '<div class="step">'+stepHead(6,'layers','Battery','APX HV \u2014 5 kWh modules'+(a2()?', 1 tower per input, up to 5':', up to 6 per input, 1 or 2 towers'),'Optional')+'<div class="step-b">'+gate+typeSel+capNote+inSel+build+'</div></div>';
}
function housePhotoHTML(){
  var bom=buildBOM();
  var has=function(g){return bom.some(function(r){return r.g===g;});};
  var invOn=has('Inverter'),batOn=has('Battery'),metOn=has('Metering'),backOn=has('Backup');
  var nTowers=batOn?Math.max(1,Math.min(state.inputs.length,3)):0;
  var s='<div class="housephoto"><div class="photostage"><img class="hbase" src="'+HOUSE_IMG+'" alt="System overview">';
  for(var k=1;k<nTowers;k++){
    s+='<img class="btower" src="'+BATT_IMG+'" style="left:'+(46.32+k*6.92).toFixed(2)+'%;top:'+(59.28+k*0.63).toFixed(2)+'%;width:6.46%">';
  }
  s+='<div class="oline'+(invOn?' lit':'')+'" style="left:30.97%;top:52.20%;width:9.35%;height:21.80%"></div>';
  for(var j=0;j<nTowers;j++){
    s+='<div class="oline lit" style="left:'+(46.45+j*6.92).toFixed(2)+'%;top:'+(59.33+j*0.63).toFixed(2)+'%;width:6.29%;height:13.63%"></div>';
  }
  s+='<img class="meterimg'+(metOn?' lit':'')+'" src="'+METER_IMG+'" style="left:39.91%;top:47.45%;width:7.93%">';
  if(metOn)s+='<div class="oline lit" style="left:41.45%;top:49.90%;width:4.52%;height:8.23%"></div>';
  s+='<div class="photocap">'+
      '<div class="pmini'+(invOn?' lit':'')+'">Inverter</div>'+
      '<div class="pmini'+(batOn?' lit':'')+'">Battery</div>'+
      '<div class="pmini'+(metOn?' lit':'')+'">Meter</div>'+
      '<div class="pmini'+(backOn?' lit':'')+'">Backup</div>'+
    '</div></div></div>';
  return s;
}
function cartHTML(){
  var bom=buildBOM(),b=batteryTotals(),items=bom.reduce(function(s,r){return s+r.qty;},0);
  var body;
  if(bom.length===0){
    body='<div class="empty"><div class="big">'+ic('cart',22)+'</div><div class="t">Your system is empty</div><div class="s">Start by choosing an inverter \u2014 items are added here as you go.</div></div>';
  } else {
    var warn=selInvalid()?'<div class="pverr" style="margin-bottom:10px">'+ic('alert',15)+'Inverter too small for '+totalKWp()+' kWp \u2014 fix in step 2.</div>':'';
    var groups=GROUP_ORDER.filter(function(g){return bom.some(function(r){return r.g===g;});});
    var rows=groups.map(function(g){var gi=GICON[g]||'cart';
      return '<div class="gh">'+g+'</div>'+bom.filter(function(r){return r.g===g;}).map(function(r){var p=r.item.split('|'),red=(g==='Inverter'&&selInvalid());
        return '<div class="citem'+(red?' citem-red':'')+'"><span class="cico">'+ic(gi,15)+'</span><span class="cname">'+p[0]+(p[1]?'<small>'+p[1]+'</small>':'')+'</span><span class="cqty">\u00d7'+r.qty+'</span></div>';}).join('');
    }).join('');
    var caps='<div class="capstrip"><div><div class="cl">Battery</div><div class="cv">'+b.kwh+' kWh</div></div><div><div class="cl">Solar</div><div class="cv" style="'+(pvOver()?'color:var(--red)':'')+'">'+totalKWp()+' kWp</div></div><div><div class="cl">DC/AC</div><div class="cv" style="'+(pvOver()?'color:var(--red)':'')+'">'+(state.kw?Math.round(pvRatio()):0)+'%</div></div></div>';
    body=warn+rows+caps;
  }
  return '<div class="cart-h"><span class="ch-t">'+ic('cart',17)+' Your system</span><span class="count-badge">'+items+' item'+(items===1?'':'s')+'</span></div>'+
    '<div class="cart-items">'+body+'</div>'+
    '<div class="cart-foot"><button class="btn primary" style="flex:1;justify-content:center" data-act="print">'+ic('printer',15)+'Print BOM</button><button class="btn" id="copyBtn" data-act="copy">'+ic('copy',15)+'Copy</button></div>'+
    '<div class="cart-disc"><span class="i">'+ic('info',13)+'</span><span>1 BMS per battery input, 1 base per tower, parallel cable per split (not CANbus). 200% PV cap. Verify against Aprilice &amp; the current Growatt manual.</span></div>';
}
function cartbarHTML(){var b=batteryTotals(),items=buildBOM().reduce(function(s,r){return s+r.qty;},0);
  return '<button class="bar-main" data-act="tocart">'+ic('cart',16,'var(--grnD)')+'<span><b>'+items+'</b> item'+(items===1?'':'s')+(b.kwh?' \u00b7 '+b.kwh+' kWh':'')+'</span></button><button class="btn primary" data-act="print">'+ic('printer',15)+'Print</button>';}
function printRecapHTML(){var b=batteryTotals();
  function rr(k,v){return '<div class="rr"><span class="k">'+k+'</span><span class="v">'+v+'</span></div>';}
  var inv=state.family&&state.kw?'Growatt '+fam().name+' '+state.kw+' kW ('+fam().phase+')':'(not selected)';
  var batLine=state.inputs.length?(isAxeFam()?('AXE \u00b7 '+b.inputs+' cabinet(s) \u00b7 '+b.kwh+' kWh'):('APX '+state.apx+' \u00b7 '+b.inputs+' input(s) \u00b7 '+b.kwh+' kWh \u00b7 '+b.bms+' BMS \u00b7 '+b.bases+' base(s)'+(b.cascades?' \u00b7 '+b.cascades+' parallel cable(s)':''))):'(none)';
  return '<div class="printrecap">'+rr('Solar',state.panelCount+' x '+state.panelW+' Wp = '+totalKWp()+' kWp'+(state.kw?' \u00b7 DC/AC '+Math.round(pvRatio())+'%':''))+rr('Inverter',inv)+rr('Connectivity',state.dongle?DONGLES[state.dongle].name:'(none)')+rr('Metering',state.metering==='shinesem'?'ShineSEM-X':state.metering==='meter'?'Smart Meter '+state.meterType:'(none)')+rr('Backup',isHU()?'Integrated (HU)':needsSyn()?synItem().split('|')[0]:'None')+rr('Battery',batLine)+'</div>';}
function render(){
  var html='<div class="page">'+
    '<div class="topbar"><div class="logo">'+ic('zap',19,'#fff')+'</div><div><h1>APX System Designer</h1><div class="sub">Growatt \u00b7 products per Aprilice \u00b7 MOD / MID / WIT + APX &amp; AXE</div></div></div>'+
    '<div class="printhead"><div class="pt">Growatt Energy System \u2014 Bill of Materials</div><div class="pd">'+new Date().toLocaleDateString()+'</div></div>'+
    printRecapHTML()+
    '<div class="layout"><div class="stepcol">'+panelStep()+invStep()+dongleStep()+meterStep()+backupStep()+batteryStep()+'</div>'+
    '<aside class="cartcol">'+housePhotoHTML()+'<div class="cart" id="cart">'+cartHTML()+'</div></aside></div>'+
    '<div class="cartbar" id="cartbar">'+cartbarHTML()+'</div></div>';
  document.getElementById('app').innerHTML=html;
}
function onPanels(){
  if(state.family&&state.kw&&state.panelCount>0&&!kwValid(state.kw)){var v=fam().kw.filter(kwValid);if(v.length)state.kw=v[0];}
  var a=document.getElementById('pvTop');if(a)a.innerHTML=pvTopHTML();
  var b=document.getElementById('invStepBody');if(b)b.innerHTML=invStepBodyHTML();
  var c=document.getElementById('cart');if(c)c.innerHTML=cartHTML();
  var d=document.getElementById('cartbar');if(d)d.innerHTML=cartbarHTML();
}
document.addEventListener('click',function(e){
  var el=e.target.closest&&e.target.closest('[data-act]');if(!el)return;var a=el.getAttribute('data-act');
  if(a==='fam'){var k=el.getAttribute('data-k');if(!famValid(k))return;state.family=k;var f=FAMILIES[k];var v=f.kw.filter(kwValid);state.kw=v.length?v[0]:f.kw[0];state.inputs=state.inputs.slice(0,f.inputs);clampInputs();render();}
  else if(a==='kw'){var p=+el.getAttribute('data-p');if(!kwValid(p))return;state.kw=p;render();}
  else if(a==='dongle'){var k=el.getAttribute('data-k');state.dongle=(state.dongle===k)?null:k;render();}
  else if(a==='metering'){var m=el.getAttribute('data-m');state.metering=(state.metering===m)?null:m;render();}
  else if(a==='mt'){state.meterType=el.getAttribute('data-t');render();}
  else if(a==='backup'){state.backupOn=!state.backupOn;render();}
  else if(a==='apx'){state.apx=el.getAttribute('data-v');clampInputs();render();}
  else if(a==='inputs'){var n=+el.getAttribute('data-n');if(n>fam().inputs)return;var axe=isAxeFam();while(state.inputs.length<n)state.inputs.push(axe?{modules:6}:{mods:4,cols:1,c1:4,c2:0});state.inputs=state.inputs.slice(0,n);clampInputs();render();}
  else if(a==='mod'){var j=+el.getAttribute('data-i'),dd=+el.getAttribute('data-d');if(dd>0&&!canAddModule())return;var inp=state.inputs[j];inp.mods=clamp(inp.mods+dd,minMods(),maxMods());inp.c1=inp.mods;inp.c2=0;render();}
  else if(a==='colmod'){var j=+el.getAttribute('data-i'),col=el.getAttribute('data-col'),dd=+el.getAttribute('data-d');if(dd>0&&!canAddModule())return;var inp=state.inputs[j],mx=maxMods();
    if(col==='c1'){var nv=inp.c1+dd;if(dd>0){if(nv+inp.c2<=mx)inp.c1=nv;}else{if(nv>=1)inp.c1=nv;}}
    else{var nv2=inp.c2+dd;if(dd>0){if(inp.c1+nv2<=mx)inp.c2=nv2;}else{if(nv2>=1)inp.c2=nv2;}}
    inp.mods=inp.c1+inp.c2;render();}
  else if(a==='axemod'){var j=+el.getAttribute('data-i'),dd=+el.getAttribute('data-d');var inp=state.inputs[j];inp.modules=clamp(inp.modules+dd,1,AXE_MAX_MODULES);render();}
  else if(a==='cols'){var j=+el.getAttribute('data-i'),cc=+el.getAttribute('data-c');var inp=state.inputs[j];if(a2())return;
    if(cc===2){if(inp.mods<2)return;inp.cols=2;inp.c1=Math.ceil(inp.mods/2);inp.c2=Math.floor(inp.mods/2);if(inp.c1<1)inp.c1=1;if(inp.c2<1)inp.c2=1;}
    else{inp.cols=1;inp.mods=inp.c1+inp.c2;}
    render();}
  else if(a==='wantbat'){var v=el.getAttribute('data-v');state.wantBattery=(v==='yes');if(v==='no')state.inputs=[];render();}
  else if(a==='print'){window.print();}
  else if(a==='tocart'){var cc2=document.getElementById('cart');if(cc2)cc2.scrollIntoView({behavior:'smooth',block:'start'});}
  else if(a==='copy'){var t=buildText();function done(){var btn=document.getElementById('copyBtn');if(btn){btn.innerHTML=ic('check',15)+'Copied';btn.classList.add('ok');setTimeout(function(){if(btn){btn.innerHTML=ic('copy',15)+'Copy';btn.classList.remove('ok');}},1600);}}if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(done).catch(function(){fb(t,done);});}else fb(t,done);}
});
function fb(t,d){var ta=document.createElement('textarea');ta.value=t;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');}catch(e){}document.body.removeChild(ta);d();}
document.addEventListener('input',function(e){
  if(e.target.id==='panelW'){state.panelW=clamp(parseInt(e.target.value||'0',10)||0,0,800);onPanels();}
  else if(e.target.id==='panelCount'){state.panelCount=clamp(parseInt(e.target.value||'0',10)||0,0,400);onPanels();}
});
render();
</script>
</body>
</html>
